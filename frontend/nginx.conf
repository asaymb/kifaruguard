# Template processed by the official Nginx image (envsubst).
# BACKEND_HOST / BACKEND_PORT: use defaults for Docker Compose; set on Railway to your backend private hostname + port.

upstream backend_api {
  server ${BACKEND_HOST}:${BACKEND_PORT};
}

server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~ ^/(auth|agents|audit|hitl|config|health) {
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://backend_api;
  }

  location /ws/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_pass http://backend_api;
  }
}
