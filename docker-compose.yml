services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kifaru_guard
      POSTGRES_USER: kifaru
      POSTGRES_PASSWORD: kifaru123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kifaru -d kifaru_guard"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: >
      sh -c "ollama serve &
      sleep 5 &&
      ollama pull tinyllama &&
      wait"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://kifaru:kifaru123@postgres:5432/kifaru_guard
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-only-jwt-secret-change-for-any-real-use}
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-dev-only-audit-hmac-change-for-real-use}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      ALLOW_ADMIN_SEED: ${ALLOW_ADMIN_SEED:-1}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: tinyllama
      RUNTIME_CONFIG_PATH: /app/config/runtime.yaml
      AGENT_FILE_ROOT: /app/data/uploads
      AGENT_ALLOW_FILE_PATH: "1"
    volumes:
      - ./:/app
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import os,urllib.request; p=os.environ.get('PORT','8000'); urllib.request.urlopen('http://127.0.0.1:'+p+'/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
