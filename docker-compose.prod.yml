# Profil proche production (sans Ollama) — LLM : OpenAI ou repli sûr.
# Usage : docker compose -f docker-compose.prod.yml up --build
# Prérequis : JWT_SECRET_KEY, AUDIT_HMAC_SECRET, ALLOWED_ORIGINS ; OPENAI_API_KEY recommandé.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kifaru_guard}
      POSTGRES_USER: ${POSTGRES_USER:-kifaru}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kifaru123}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kifaru} -d ${POSTGRES_DB:-kifaru_guard}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-kifaru}:${POSTGRES_PASSWORD:-kifaru123}@postgres:5432/${POSTGRES_DB:-kifaru_guard}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENVIRONMENT: production
      OLLAMA_ENABLED: "0"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUNTIME_CONFIG_PATH: /app/config/runtime.yaml
      AGENT_FILE_ROOT: /app/data/uploads
      AGENT_ALLOW_FILE_PATH: "1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
